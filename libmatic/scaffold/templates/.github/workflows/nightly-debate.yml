name: nightly-topic-debate

on:
  schedule:
    # 毎日 03:00 JST = 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "対象 issue 番号 (省略時は topic/ready から最古を 1 件 pick)"
        required: false

jobs:
  debate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
      - name: Install libmatic
        run: uv sync
      - name: Pick issue (LRU from topic/ready)
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.inputs.issue_number }}"
          if [ -z "$ISSUE" ]; then
            ISSUE=$(gh issue list --label topic/ready --state open --json number --limit 1 --jq '.[0].number')
          fi
          if [ -z "$ISSUE" ]; then
            echo "No topic/ready issue found"
            exit 0
          fi
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
      - name: Run topic-debate
        if: steps.pick.outputs.issue != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run libmatic topic-debate ${{ steps.pick.outputs.issue }} --config config/libmatic.yml
